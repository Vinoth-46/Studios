<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triova Studio — Premium Web Design & Development Agency</title>
    <meta name="description" content="Triova Studio is a premier web design agency specializing in high-end, conversion-optimized websites for restaurants, fitness studios, e-commerce, and corporate businesses. Elevate your digital presence today." />
    <meta name="keywords" content="web design agency, custom website development, restaurant web design, gym website design, ecommerce development, corporate web design, Triova Studio, premium web agency" />
    <meta name="author" content="Triova Studio" />
    <link rel="canonical" href="https://triova-webstudio.me" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://triova-webstudio.me/" />
    <meta property="og:title" content="Triova Studio — Premium Web Design & Development Agency" />
    <meta property="og:description" content="Boutique web design studio building stunning, high-performance websites for businesses of every kind." />
    <meta property="og:image" content="https://triova-webstudio.me/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://triova-webstudio.me/" />
    <meta property="twitter:title" content="Triova Studio — Premium Web Design & Development Agency" />
    <meta property="twitter:description" content="Boutique web design studio building stunning, high-performance websites for businesses of every kind." />
    <meta property="twitter:image" content="https://triova-webstudio.me/og-image.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Critical CSS -->
    <style>
      .skip-link { position: absolute; top: -100px; left: 0; background: var(--accent); color: white; padding: 1rem; z-index: 1000; transition: top 0.3s; }
      .skip-link:focus { top: 0; }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --bg: #F8F7F4; --white: #FFFFFF; --text: #0F0F0D; --muted: #4B5563; --accent: #1B4FD8; --accent-light: #EEF2FF; --border: #E5E4E0; }
      html { scroll-behavior: smooth; }
      body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.7; overflow-x: hidden; }
      nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.2rem 6%; display: flex; align-items: center; justify-content: space-between; background: rgba(248,247,244,0.93); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); transition: all 0.35s ease; }
      .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.65rem; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.02em; }
      .logo span { color: var(--accent); }
      .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 9rem 6% 4rem; position: relative; overflow: hidden; }
      .hero-inner { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 3rem; }
      .hero-text { flex: 1; min-width: 0; }
      .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 5.5vw, 5.5rem); font-weight: 600; line-height: 1.05; letter-spacing: -0.03em; max-width: 900px; margin-bottom: 1.5rem; }
      .hero h1 em { font-style: italic; color: var(--accent); }
      .hero-text > p, .hero-description { font-size: 1.05rem; color: var(--muted); max-width: 540px; margin: 0 auto 2.5rem; font-weight: 300; line-height: 1.85; }
      .hero-actions { display: flex; gap: 1rem; align-items: center; justify-content: center; }
      .btn-primary { font-size: 0.95rem; font-weight: 500; background: var(--text); color: #fff; padding: 0.85rem 2rem; border-radius: 100px; text-decoration: none; transition: all 0.3s ease; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }
    </style>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
    </noscript>

  </head>
  <body>
    <a href="#home" class="skip-link">Skip to Content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
